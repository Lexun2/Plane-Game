            if (e.code === 'Escape' && gameRunning) { gamePaused ? resumeGame() : pauseGame(); }
        });
        document.addEventListener('keyup', e => keys[e.code] = false);

        // === MOBILE CONTROLS: Joystick + Fire button ===
        (function() {
            const joystickZone = document.getElementById('joystickZone');
            const knob = document.getElementById('joystickKnob');
            const fireBtn = document.getElementById('fireBtn');
            const BASE_RADIUS = 32;   // half of joystickBase 65px
            const KNOB_RADIUS = 13;   // half of knob 27px
            const DEAD_ZONE = 6;      // px threshold before registering direction

            let joystickActive = false;
            let joystickOriginX = 32;
            let joystickOriginY = 32;
            let joystickTouchId = null;

            function resetKnob() {
                knob.style.left = (BASE_RADIUS - KNOB_RADIUS) + 'px';
                knob.style.top  = (BASE_RADIUS - KNOB_RADIUS) + 'px';
                keys['ArrowLeft']  = false;
                keys['ArrowRight'] = false;
            }

            joystickZone.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (joystickActive) return;
                const t = e.changedTouches[0];
                joystickTouchId = t.identifier;
                joystickActive = true;
                const rect = joystickZone.getBoundingClientRect();
                joystickOriginX = t.clientX - rect.left;
                joystickOriginY = t.clientY - rect.top;
                knob.style.left = (joystickOriginX - KNOB_RADIUS) + 'px';
                knob.style.top  = (joystickOriginY - KNOB_RADIUS) + 'px';
            }, { passive: false });

            joystickZone.addEventListener('touchmove', function(e) {
                e.preventDefault();
                if (!joystickActive) return;
                let t = null;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        t = e.changedTouches[i]; break;
                    }
                }
                if (!t) return;
                const rect = joystickZone.getBoundingClientRect();
                let dx = (t.clientX - rect.left) - joystickOriginX;
                let dy = (t.clientY - rect.top)  - joystickOriginY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > BASE_RADIUS) {
                    dx = dx / dist * BASE_RADIUS;
                    dy = dy / dist * BASE_RADIUS;
                }
                knob.style.left = (joystickOriginX + dx - KNOB_RADIUS) + 'px';
                knob.style.top  = (joystickOriginY + dy - KNOB_RADIUS) + 'px';
                keys['ArrowLeft']  = dx < -DEAD_ZONE;
                keys['ArrowRight'] = dx >  DEAD_ZONE;
            }, { passive: false });

            function joystickEnd(e) {
                e.preventDefault();
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === joystickTouchId) {
                        joystickActive = false;
                        joystickTouchId = null;
                        resetKnob();
                        break;
                    }
                }
            }
            joystickZone.addEventListener('touchend',    joystickEnd, { passive: false });
            joystickZone.addEventListener('touchcancel', joystickEnd, { passive: false });

            // Fire button — tap = one shot, hold = continuous
            fireBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                keys['Space'] = true;
                fireBtn.classList.add('pressed');
            }, { passive: false });
            fireBtn.addEventListener('touchend', function(e) {
                e.preventDefault();
                keys['Space'] = false;
                fireBtn.classList.remove('pressed');
            }, { passive: false });
            fireBtn.addEventListener('touchcancel', function(e) {
                keys['Space'] = false;
                fireBtn.classList.remove('pressed');
            });
        })();

        // Show/hide touch controls — only when player can actually steer
        function updateTouchControls() {
            const tc = document.getElementById('touchControls');
            if (!tc) return;
            if (gameControlsEnabled) {
                tc.classList.add('visible');
            } else {
                tc.classList.remove('visible');
            }
        }
        setInterval(updateTouchControls, 100);

        document.getElementById('btnPlay').addEventListener('click', function() {
            const fo = document.getElementById('fadeOverlay');
            fo.style.opacity = '1';
            fo.addEventListener('transitionend', function handler() {
                fo.removeEventListener('transitionend', handler);
                startGame(true);
            }, { once: true });
        });

        function showLeaderboard() {
            window.loadLeaderboard();
            window.renderLeaderboard();
            showScreen(document.getElementById('leaderboardScreen'));
        }

        const btnLeaderboardEl = document.getElementById('btnLeaderboard');
        if (btnLeaderboardEl) btnLeaderboardEl.addEventListener('click', showLeaderboard);

        const btnLeaderboardCloseEl = document.getElementById('btnLeaderboardClose');
        if (btnLeaderboardCloseEl) btnLeaderboardCloseEl.addEventListener('click', () => goToMainMenu());

        const btnLeaderboardFromGameOverEl = document.getElementById('btnLeaderboardFromGameOver');
        if (btnLeaderboardFromGameOverEl) btnLeaderboardFromGameOverEl.addEventListener('click', showLeaderboard);

        const btnSaveScoreEl = document.getElementById('btnSaveScore');
        if (btnSaveScoreEl) btnSaveScoreEl.addEventListener('click', () => {
            const name = (document.getElementById('playerNameInput')?.value || 'Player').trim() || 'Player';
            window.addLeaderboardEntry(name, score);
            window.renderLeaderboard();
            showLeaderboard();
        });

        document.getElementById('btnSettings').addEventListener('click', () => showScreen(settingsScreen));
        document.getElementById('btnSettingsBack').addEventListener('click', () => showScreen(mainMenu));
        document.getElementById('btnResume').addEventListener('click', resumeGame);
        document.getElementById('btnPauseMainMenu').addEventListener('click', goToMainMenu);
        document.getElementById('btnRestart').addEventListener('click', startGame);
        document.getElementById('btnGameOverMainMenu').addEventListener('click', goToMainMenu);

        document.querySelectorAll('.toggle-group').forEach(group => {
            group.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const key = group.id.replace('Group', '');
                    const map = { diff: 'difficulty', sound: 'sound', map: 'mapSize' };
                    settings[map[key]] = btn.dataset.val;
                });
            });
        });

        resizeCanvas(settings.mapSize);
        preloadImages();
        initStars();
        ctx.fillStyle = '#16213e'; ctx.fillRect(0, 0, W, H);
        drawStars();
        // Initialize leaderboard data
        // Load existing leaderboard from localStorage
        (function initLeaderboard() {
            try {
                const stored = localStorage.getItem('plane_game_leaderboard');
                window.__leaderboard = stored ? JSON.parse(stored) : [];
            } catch {
                window.__leaderboard = [];
            }
        })();

        // Simple helpers accessible in this scope
        window.loadLeaderboard = function() { try { const s = localStorage.getItem('plane_game_leaderboard'); window.__leaderboard = s ? JSON.parse(s) : []; } catch { window.__leaderboard = []; } }
        window.saveLeaderboard = function() { localStorage.setItem('plane_game_leaderboard', JSON.stringify(window.__leaderboard)); }
        window.renderLeaderboard = function() {
            const tBody = document.querySelector('#leaderboardTable tbody');
            if (!tBody) return;
            tBody.innerHTML = (window.__leaderboard || [])
                .slice(0, 100)
                .map(r => `<tr><td>${r.name}</td><td>${r.score}</td><td>${r.date}</td></tr>`)
                .join('');
        }

        window.addLeaderboardEntry = function(name, score) {
            const date = new Date().toISOString().slice(0, 10);
            window.__leaderboard = window.__leaderboard || [];
            window.__leaderboard.push({ name, score, date });
            window.__leaderboard.sort((a,b) => b.score - a.score);
            window.__leaderboard = window.__leaderboard.slice(0, 100);
            window.saveLeaderboard();
        }

        window.goToMainMenuFromLeaderboard = function() {
            const scr = document.getElementById('leaderboardScreen');
            if (scr) scr.classList.add('hidden');
            const menu = document.getElementById('mainMenu');
            if (menu) menu.classList.remove('hidden');
        };

        })();
        </script>

        <div id="leaderboardScreen" class="screen hidden">
            <div class="settings-box" style="min-width: 520px; max-width: 90vw; overflow: auto; max-height: 70vh;">
                <h2>Лидеры</h2>
                <table id="leaderboardTable" style="width:100%; border-collapse: collapse;">
                    <thead><tr><th>Имя</th><th>Очки</th><th>Дата</th></tr></thead>
                    <tbody></tbody>
                </table>
                <button class="btn btn-secondary" id="btnLeaderboardClose" style="width:100%; margin-top:10px;" onclick="goToMainMenuFromLeaderboard()">Закрыть</button>
            </div>
        </div>
    </div><!-- /#gameContainer -->

    <div id="touchControls">
        <div id="joystickZone">
            <div id="joystickBase"></div>
            <div id="joystickKnob"></div>
        </div>
        <div id="fireBtn">&#128293;</div>
    </div>
    </div><!-- /#mobileWrapper -->
</body>
</html>
